# TRM Nirvana v3.0 - Render Deployment Config

services:
  # Main web service
  - type: web
    name: trm-nirvana
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    healthCheckTimeout: 100
    autoDeploy: true
    envVars:
      - key: PORT
        value: 9000
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"

  # Redis service (optional)
  - type: redis
    name: trm-redis
    plan: free
    ipAllowList: []

  # PostgreSQL service (optional)
  - type: pserv
    name: trm-postgres
    plan: free
    envVars:
      - key: POSTGRES_DB
        value: trm_nirvana
      - key: POSTGRES_USER
        value: trm_user
      - key: POSTGRES_PASSWORD
        value: trm_password
