version: '3.8'

services:
  trm-nirvana:
    build: .
    container_name: trm-nirvana-cloud
    ports:
      - "9000:9000"
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PHONE=${TELEGRAM_PHONE}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - FACEBOOK_ACCESS_TOKEN=${FACEBOOK_ACCESS_TOKEN}
      - INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN}
      - TIKTOK_ACCESS_TOKEN=${TIKTOK_ACCESS_TOKEN}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID}
      - STORE_URL=${STORE_URL:-https://trendurunlermarket.com}
      - COMMISSION_THRESHOLD=${COMMISSION_THRESHOLD:-20.0}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-300}
      - MAX_PRODUCTS_PER_DAY=${MAX_PRODUCTS_PER_DAY:-50}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./temp_photos:/app/temp_photos
      - ./temp_docs:/app/temp_docs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - trm-network

  redis:
    image: redis:7-alpine
    container_name: trm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - trm-network

  postgres:
    image: postgres:15-alpine
    container_name: trm-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-trm_nirvana}
      - POSTGRES_USER=${POSTGRES_USER:-trm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-trm_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - trm-network

volumes:
  redis_data:
  postgres_data:

networks:
  trm-network:
    driver: bridge
