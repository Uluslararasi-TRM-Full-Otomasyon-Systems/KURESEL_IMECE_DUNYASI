# TRM Nirvana v3.0 - Railway Deployment Config

build:
  builder: NIXPACKS
  buildCommand:
    - pip install -r requirements.txt

deploy:
  startCommand: python main_orchestrator.py
  healthcheckPath: /
  healthcheckTimeout: 100
  restartPolicyType: ON_FAILURE
  restartPolicyMaxRetries: 10

services:
  - name: web
    sourceDir: /
    type: web
    plan: starter
    runtime: python
    healthCheckPath: /
    healthCheckTimeout: 100
    autoDeploy: true

# Environment variables (Railway Dashboard'da ayarlayın)
environment:
  - key: PORT
    value: 9000
  - key: PYTHONUNBUFFERED
    value: "1"
  - key: PYTHONDONTWRITEBYTECODE
    value: "1"
